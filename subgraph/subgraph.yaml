specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: WeatherOracle
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: WeatherOracle
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - WeatherRequest
        - WeatherReport
      abis:
        - name: WeatherOracle
          file: ../artifacts/contracts/WeatherOracle.sol/WeatherOracle.json
      eventHandlers:
        - event: WeatherRequested(indexed bytes32,string,indexed address)
          handler: handleWeatherRequested
        - event: WeatherReported(indexed bytes32,string,int256,string,uint256)
          handler: handleWeatherReported
      file: ./src/mappings/weather-oracle.ts